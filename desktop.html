<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <!-- Forțează randarea în format desktop pe mobil (Android & iOS) -->
  <meta name="viewport" content="width=1280">
  <title>Realm Virtual Tour — Desktop</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #14120e;
      overflow: hidden;
    }
    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
    }
    /* Fallback vizibil doar dacă iframe-ul nu se poate încărca */
    .fallback {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: Georgia, serif;
      color: #efe7d6;
      text-align: center;
      z-index: -1;
    }
    .fallback a { color: #8c6a2f; }
  </style>
</head>
<body>
  <p class="fallback">
    Se încarcă turul virtual…<br>
    Dacă nu pornește, <a href="https://daescunnistor-lab.github.io/REALM-VIRTUAL-TOUR/">apasă aici</a>.
  </p>
  <iframe src="https://daescunnistor-lab.github.io/REALM-VIRTUAL-TOUR/"
          title="Realm Virtual Tour"
          allow="fullscreen; accelerometer; gyroscope; xr-spatial-tracking"
          allowfullscreen></iframe>
</body>
</html>
